name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Version Python utilisée dans l'environnement Conda

      - name: Set up Conda
        uses: s-weigand/setup-conda@v1
        with:
          activate-environment: dify # Activer l'environnement Conda "dify"
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          npm install

      - name: Build Frontend
        run: npm run build
        working-directory: ./web

      - name: Build and run Docker containers
        run: |
          docker compose -f docker-compose.middleware.yaml up -d --build

      - name: Apply database migrations (Flask)
        run: flask db upgrade
        working-directory: ./api # Chemin vers le répertoire du backend Flask

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_calm-island-05e944103 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./web/build" # Dossier de sortie de la construction du frontend
          api_location: "" # Pas de déploiement direct de l'API, car elle est gérée par Docker
          output_location: ""

      - name: Stop Docker containers
        if: always() # Toujours exécuter cette étape, même en cas d'échec précédent
        run: docker compose -f docker-compose.middleware.yaml down

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_ISLAND_05E944103 }}
          action: "close"
