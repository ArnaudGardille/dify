name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Cache Node.js modules
        uses: actions/cache@v3
        with:
          path: ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Node.js dependencies
        working-directory: ./web
        run: yarn install --prefer-offline

      - name: Configure frontend environment variables
        working-directory: ./web
        run: |
          cp .env.example .env.local
          echo "NEXT_PUBLIC_DEPLOY_ENV=DEVELOPMENT" >> .env.local
          echo "NEXT_PUBLIC_EDITION=SELF_HOSTED" >> .env.local
          echo "NEXT_PUBLIC_API_PREFIX=http://<YOUR_BACKEND_URL>/console/api" >> .env.local # Replace <YOUR_BACKEND_URL> with actual backend URL.
          echo "NEXT_PUBLIC_PUBLIC_API_PREFIX=http://<YOUR_BACKEND_URL>/api" >> .env.local # Replace <YOUR_BACKEND_URL> with actual backend URL.
          echo "NEXT_PUBLIC_SENTRY_DSN=" >> .env.local

      # Build Frontend.
      - name: Build Frontend 
        working-directory : ./web  
        run : yarn build 

      # Deploy to Azure Static Web Apps 
      - name : Deploy to Azure Static Web Apps 
        uses : Azure/static-web-apps-deploy@v1 
        with :
          azure_static_web_apps_api_token : ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_ISLAND_05E944103 }}
          repo_token : ${{ secrets.GITHUB_TOKEN }}
          action : 'upload'
          app_location : './web' # Directory of your Next.js app 
          output_location : './web/.next' # Output directory of frontend build 
          app_build_command : 'yarn build' # Specify the build command for the frontend 

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest 
    name: Close Pull Request Job 
    steps:
      - name: Close Pull Request 
        id: closepullrequest 
        uses: Azure/static-web-apps-deploy@v1 
        with:
          azure_static_web_apps_api_token : ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_ISLAND_05E944103 }}
          action : 'close'